syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.lumina.orderbook.grpc";

package lumina.orderbook;

service OrderService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc GetOrderBook(OrderBookRequest) returns (OrderBookResponse);
}

enum Side {
  SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderTypeEnum {
  ORDER_TYPE_UNSPECIFIED = 0;
  LIMIT = 1;
  MARKET = 2;
}

message PlaceOrderRequest {
  string symbol = 1;
  Side side = 2;
  OrderTypeEnum type = 3;
  string price = 4;
  string quantity = 5;
}

message PlaceOrderResponse {
  string id = 1;
  string symbol = 2;
  Side side = 3;
  OrderTypeEnum type = 4;
  string price = 5;
  string quantity = 6;
  string status = 7;
  string created_at = 8;
}

message OrderBookRequest {
  string symbol = 1;
}

message OrderBookLevel {
  string price = 1;
  string quantity = 2;
}

message OrderBookResponse {
  string symbol = 1;
  repeated OrderBookLevel bids = 2;
  repeated OrderBookLevel asks = 3;
}

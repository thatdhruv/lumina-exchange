replicaCount: 2

image:
  repository: lumina-exchange
  tag: "0.3.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  internal:
    type: ClusterIP
    port: 9090
    grpcPort: 9090
    metricsPort: 8080
  api:
    type: LoadBalancer
    port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60

config:
  kafkaBootstrapServers: kafka:29092
  redisHost: redis
  redisPort: "6379"
  grpcPort: "9090"
  serverPort: "8080"

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  labels:
    release: prometheus

livenessProbe:
  path: /actuator/health/liveness
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  path: /actuator/health/readiness
  initialDelaySeconds: 20
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}
